{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Email Sent | IronLog</title>

    <link rel="stylesheet" href="{% static 'core/css/theme.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/login.css' %}">

    <style>
        .reset-success-wrapper {
            text-align: center;
        }
        .reset-icon-large {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .reset-description {
            margin-bottom: 24px;
        }
    </style>
</head>

<body class="auth-body">

<div class="auth-container">

    <div class="brand-section">
        <div class="brand-icon">
            <span class="icon-bolt">⚡</span>
        </div>
        <h1 class="brand-title">IronLog</h1>
        <p class="brand-subtitle">Professional Training System</p>
    </div>

    <div class="card reset-success-wrapper">

        <div class="reset-icon-large">
            <span>✉️</span>
        </div>

        <h2 class="card-title">Check Your Inbox</h2>

        <p class="form-description reset-description">
            We've emailed you instructions for setting your password, if an account exists with the email you entered.
            You should receive them shortly.
        </p>

        <div class="divider"></div>

        <a href="{% url 'login' %}" class="btn-secondary">
            Return to Login
        </a>

    </div>

</div>

<script src="{% static 'core/js/main.js' %}"></script>
</body>

</html>
