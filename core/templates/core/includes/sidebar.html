<div class="sidebar">

  <div>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">
        <h5>IronLog</h5>
        <small>Training System</small>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="nav-links mt-4">
      <a href="{% url 'dashboard' %}" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
        📋 Dashboard
      </a>

      <a href="{% url 'program_builder' %}" class="nav-item {% if active_page == 'program_builder' %}active{% endif %}">
        📅 Program Builder
      </a>

      <a href="{% url 'analytics' %}" class="nav-item {% if active_page == 'analytics' %}active{% endif %}">
        📊 Analytics
      </a>
    </div>
  </div>

  <div class="user-section">
    <div class="user-card">
      <div class="avatar">A</div>
      <div>
        <strong>{{ request.user.username }}</strong><br>
      </div>
    </div>

    <div class="sidebar-footer mt-4">

      <form method="POST" action="{% url 'logout' %}" class="sidebar-logout-form">
        {% csrf_token %}
        <button type="submit" class="sidebar-logout-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign Out
        </button>
      </form>
    </div>
  </div>

</div>
